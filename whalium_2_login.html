<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whalium 华里安 · 登录</title>
    <style>
        :root {
            --navy: #1a2e4a; --teal: #0099aa; --teal-dim: rgba(0,153,170,0.3);
            --bg: #eef0f3; --white: #ffffff; --silver: #4a6080;
            --silver-dim: rgba(74,96,128,0.65); --danger: #cc2233;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'PingFang SC','Microsoft YaHei',sans-serif;
            background: var(--bg); color: var(--navy);
            min-height: 100vh; display: flex; flex-direction: column;
        }

        /* ── Header ── */
        .header {
            background: var(--navy);
            padding: 0 2.5rem;
            height: 62px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .logo-section { display:flex; align-items:center; gap:0.85rem; text-decoration:none; }
        .brand-name {
            font-size:1.25rem; font-weight:800; letter-spacing:0.14em;
            background: linear-gradient(135deg,#fff 0%,#a8d8e0 100%);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
        }
        .brand-cn { font-size:0.58rem; letter-spacing:0.35em; color:rgba(200,220,230,0.7); margin-top:0.1rem; }
        .header-right { font-size:0.83rem; color:rgba(255,255,255,0.55); }
        .header-right a { color:#a8d8e0; text-decoration:none; margin-left:0.4rem; }
        .header-right a:hover { text-decoration:underline; }

        /* ── Main ── */
        .main {
            flex:1; display:flex; align-items:center; justify-content:center;
            padding: 3rem 1rem;
        }
        .login-card {
            background: #fff; border-radius: 14px;
            box-shadow: 0 4px 32px rgba(0,0,0,0.10);
            width: 100%; max-width: 420px;
            padding: 2.5rem 2.5rem 2rem;
            position: relative; overflow: hidden;
        }
        .login-card::before {
            content:''; position:absolute; top:0; left:0; right:0; height:3px;
            background: linear-gradient(90deg, var(--teal), #006e9e);
        }

        /* Logo inside card */
        .card-logo { text-align:center; margin-bottom:1.8rem; }
        .card-logo svg { width:52px; height:52px; margin:0 auto 0.6rem; display:block; }
        .card-brand { font-size:1.2rem; font-weight:800; letter-spacing:0.14em; color:var(--navy); }
        .card-brand-cn { font-size:0.6rem; letter-spacing:0.3em; color:var(--silver-dim); margin-top:0.1rem; }

        .card-title { font-size:1.35rem; font-weight:700; color:var(--navy); margin-bottom:0.25rem; }
        .card-sub { font-size:0.83rem; color:var(--silver-dim); margin-bottom:1.8rem; }

        /* Form */
        .form-group { margin-bottom:1.1rem; }
        .form-label { display:block; font-size:0.72rem; font-weight:600; color:var(--silver); margin-bottom:0.35rem; text-transform:uppercase; letter-spacing:0.05em; }
        .form-input {
            width:100%; padding:0.72rem 0.95rem;
            border:1.5px solid #d0d8e4; border-radius:7px;
            font-size:0.9rem; color:var(--navy); background:#f7f9fb;
            outline:none; transition:border-color .18s, box-shadow .18s;
        }
        .form-input:focus { border-color:var(--teal); background:#fff; box-shadow:0 0 0 3px rgba(0,153,170,0.1); }
        .form-input::placeholder { color:rgba(74,96,128,0.35); }

        /* Password toggle */
        .pw-wrap { position:relative; }
        .pw-toggle {
            position:absolute; right:0.8rem; top:50%; transform:translateY(-50%);
            background:none; border:none; cursor:pointer; font-size:1rem; color:var(--silver-dim); padding:0;
        }

        /* Options row */
        .options-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.4rem; }
        .remember { display:flex; align-items:center; gap:0.4rem; font-size:0.82rem; color:var(--silver-dim); cursor:pointer; }
        .remember input { accent-color:var(--teal); width:14px; height:14px; cursor:pointer; }
        .forgot-link { font-size:0.82rem; color:var(--teal); text-decoration:none; }
        .forgot-link:hover { text-decoration:underline; }

        /* Message */
        #login-msg { display:none; padding:0.7rem 0.9rem; border-radius:6px; font-size:0.83rem; margin-bottom:1rem; text-align:center; }

        /* Buttons */
        .btn-login-submit {
            width:100%; padding:0.85rem;
            background: linear-gradient(135deg, var(--teal) 0%, #006e9e 100%);
            color:#fff; border:none; border-radius:7px;
            font-size:0.95rem; font-weight:700; cursor:pointer;
            transition: filter .18s;
            letter-spacing:0.03em;
        }
        .btn-login-submit:hover { filter:brightness(1.1); }

        .divider { display:flex; align-items:center; gap:0.8rem; margin:1.2rem 0; }
        .divider::before,.divider::after { content:''; flex:1; height:1px; background:#e8ecf2; }
        .divider span { font-size:0.75rem; color:var(--silver-dim); white-space:nowrap; }

        .btn-wechat {
            width:100%; padding:0.78rem;
            background:#07c160; color:#fff; border:none; border-radius:7px;
            font-size:0.88rem; font-weight:600; cursor:pointer; display:flex;
            align-items:center; justify-content:center; gap:0.5rem;
            transition: filter .18s;
        }
        .btn-wechat:hover { filter:brightness(1.08); }

        .register-link { text-align:center; margin-top:1.3rem; font-size:0.83rem; color:var(--silver-dim); }
        .register-link a { color:var(--teal); text-decoration:none; font-weight:600; }
        .register-link a:hover { text-decoration:underline; }

        /* Footer */
        .footer { text-align:center; padding:1.2rem; font-size:0.75rem; color:#8a9db0; }
    
        .whalium-logo { filter:drop-shadow(0 2px 8px rgba(0,200,220,0.3)); }
        .brand-wrap { display:flex; flex-direction:column; line-height:1; }
        .brand-name {
            font-family:'Verdana','Bahnschrift','Copperplate Gothic','Arial Narrow',sans-serif;
            font-size:1.28rem; font-weight:900; font-variant:small-caps;
            letter-spacing:0.12em;
            background:linear-gradient(160deg,#fff 0%,#d0f0f8 60%,#90d8ec 100%);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
            background-clip:text; line-height:1.0;
        }
        .brand-cn {
            font-size:0.88rem; font-weight:800; color:#ffffff;
            letter-spacing:0.06em; margin-top:0.08rem;
        }
        .brand-slogan {
            font-size:0.52rem; font-style:italic;
            color:rgba(160,220,235,0.65); letter-spacing:0.04em;
            margin-top:0.2rem; white-space:nowrap;
        }

        /* ── Mobile Responsive ── */
        @media (max-width: 480px) {
            .header { padding: 0 1rem; height: 52px; }
            .brand-name { font-size: 1rem; }
            .brand-cn { font-size: 0.65rem; }
            .main { padding: 1.5rem 0.75rem; }
            .login-card { padding: 1.8rem 1.4rem 1.5rem; border-radius: 10px; }
            .card-title { font-size: 1.15rem; }
        }

    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <a href="whalium_1_index.html" class="logo-section">
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" class="whalium-logo" style="width:42px;height:42px">
  <defs>
    <radialGradient id="wbg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1c3b58"/>
      <stop offset="100%" stop-color="#091828"/>
    </radialGradient>
    <linearGradient id="wtail" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#72e8f0"/>
      <stop offset="45%" stop-color="#1acce0"/>
      <stop offset="100%" stop-color="#0892b0"/>
    </linearGradient>
    <linearGradient id="wring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6aaac8"/>
      <stop offset="35%" stop-color="#c0dcea"/>
      <stop offset="70%" stop-color="#7ab4cc"/>
      <stop offset="100%" stop-color="#4a8aaa"/>
    </linearGradient>
  </defs>

  <!-- 外粗金属环 -->
  <circle cx="100" cy="100" r="94" fill="none" stroke="url(#wring)" stroke-width="7"/>

  <!-- 四角电路方块（截图特征） -->
  <rect x="84"  y="2"   width="11" height="11" rx="2" fill="#60b8d8" opacity="0.95"/>
  <rect x="97"  y="2"   width="7"  height="7"  rx="1.5" fill="#3a9ec0" opacity="0.7"/>
  <rect x="84"  y="187" width="11" height="11" rx="2" fill="#60b8d8" opacity="0.95"/>
  <rect x="97"  y="190" width="7"  height="7"  rx="1.5" fill="#3a9ec0" opacity="0.7"/>
  <rect x="2"   y="84"  width="11" height="11" rx="2" fill="#60b8d8" opacity="0.95"/>
  <rect x="2"   y="97"  width="7"  height="7"  rx="1.5" fill="#3a9ec0" opacity="0.7"/>
  <rect x="187" y="84"  width="11" height="11" rx="2" fill="#60b8d8" opacity="0.95"/>
  <rect x="190" y="97"  width="7"  height="7"  rx="1.5" fill="#3a9ec0" opacity="0.7"/>

  <!-- 斜角小方块（截图四斜角可见） -->
  <rect x="30"  y="28"  width="8" height="8" rx="1.5" fill="#50a8c8" opacity="0.75" transform="rotate(12,34,32)"/>
  <rect x="162" y="28"  width="8" height="8" rx="1.5" fill="#50a8c8" opacity="0.75" transform="rotate(-12,166,32)"/>
  <rect x="30"  y="163" width="8" height="8" rx="1.5" fill="#50a8c8" opacity="0.75" transform="rotate(-12,34,167)"/>
  <rect x="162" y="163" width="8" height="8" rx="1.5" fill="#50a8c8" opacity="0.75" transform="rotate(12,166,167)"/>

  <!-- 电路连线（从方块到环） -->
  <line x1="100" y1="9"   x2="100" y2="22" stroke="#60b8d8" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="100" y1="178" x2="100" y2="191" stroke="#60b8d8" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="9"   y1="100" x2="22"  y2="100" stroke="#60b8d8" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="178" y1="100" x2="191" y2="100" stroke="#60b8d8" stroke-width="2.2" stroke-linecap="round"/>

  <!-- 内圆深色背景 -->
  <circle cx="100" cy="100" r="78" fill="url(#wbg)"/>

  <!-- 内圈装饰细线（两圈） -->
  <circle cx="100" cy="100" r="78" fill="none" stroke="#3a8aaa" stroke-width="2.5" opacity="0.6"/>
  <circle cx="100" cy="100" r="72" fill="none" stroke="rgba(100,200,220,0.15)" stroke-width="1"/>

  <!-- 鲸鱼尾巴左叶（宽扁，贴合截图） -->
  <path d="M100 125
           C87 134, 66 140, 48 131
           C33 123, 36 107, 47 99
           C58 91, 76 95, 100 106"
        fill="url(#wtail)"/>

  <!-- 鲸鱼尾巴右叶 -->
  <path d="M100 125
           C113 134, 134 140, 152 131
           C167 123, 164 107, 153 99
           C142 91, 124 95, 100 106"
        fill="url(#wtail)"/>

  <!-- 中间 V 形缺口 -->
  <path d="M100 106 C95 115, 95 122, 100 125 C105 122, 105 115, 100 106"
        fill="#091828"/>

  <!-- 顶鳍（水滴形，截图可见） -->
  <path d="M100 106 C96 92, 93 76, 100 66 C107 76, 104 92, 100 106"
        fill="url(#wtail)" opacity="0.85"/>
</svg>
            <div>
                <div class="brand-name">WHALIUM</div>
                <div class="brand-cn">华 里 安</div>
            </div>
        </a>
        <div class="header-right">没有账号？<a href="whalium_3_register.html">立即注册</a></div>
    </div>

    <!-- Main -->
    <div class="main">
        <div class="login-card">

            <h1 class="card-title">欢迎回来</h1>
            <p class="card-sub">登录以查看律所联系方式和全部评价</p>

            <div id="login-msg"></div>

            <div class="form-group">
                <label class="form-label">邮箱地址</label>
                <input id="email" type="email" class="form-input" placeholder="your@email.com" autocomplete="email">
            </div>

            <div class="form-group">
                <label class="form-label">密码</label>
                <div class="pw-wrap">
                    <input id="password" type="password" class="form-input" placeholder="请输入密码" autocomplete="current-password">
                    <button class="pw-toggle" onclick="togglePw()" type="button" id="pw-eye">👁</button>
                </div>
            </div>

            <div class="options-row">
                <label class="remember">
                    <input type="checkbox" checked> 记住我
                </label>
                <a href="#" class="forgot-link">忘记密码？</a>
            </div>

            <button class="btn-login-submit" onclick="handleLogin()">登 录</button>

            <div class="divider"><span>或</span></div>

            <button class="btn-wechat" onclick="handleWechat()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M8.5 11.5a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm7 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2z"/><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14.5c-3.31 0-6-2.24-6-5s2.69-5 6-5 6 2.24 6 5c0 1.07-.37 2.07-1 2.9l.5 1.6-1.75-.87c-.55.23-1.15.37-1.75.37z"/></svg>
                微信一键登录
            </button>

            <div class="register-link">
                还没有账号？<a href="whalium_3_register.html">免费注册</a>
            </div>
        </div>
    </div>

    <div class="footer">© 2025 Whalium 华里安 · 洞察全球律所，安行海外航路</div>

    <script>
    function togglePw() {
        var input = document.getElementById('password');
        var eye   = document.getElementById('pw-eye');
        if (input.type === 'password') { input.type = 'text'; eye.textContent = '🙈'; }
        else                           { input.type = 'password'; eye.textContent = '👁'; }
    }

    function showMsg(text, type) {
        var el = document.getElementById('login-msg');
        el.style.display = 'block';
        el.style.background = type === 'error' ? 'rgba(204,34,51,0.08)' : 'rgba(0,153,170,0.08)';
        el.style.color      = type === 'error' ? '#cc2233' : '#006e8a';
        el.style.border     = '1px solid ' + (type === 'error' ? 'rgba(204,34,51,0.2)' : 'rgba(0,153,170,0.2)');
        el.textContent = text;
    }

    function handleLogin() {
        var email = document.getElementById('email').value.trim();
        var pw    = document.getElementById('password').value;
        var btn   = document.querySelector('.btn-login-submit');

        if (!email) { showMsg('请输入邮箱地址', 'error'); return; }
        if (!pw)    { showMsg('请输入密码', 'error'); return; }
        if (!/\S+@\S+\.\S+/.test(email)) { showMsg('邮箱格式不正确', 'error'); return; }

        btn.textContent = '登录中…'; btn.style.opacity = '0.7';

        // Demo：模拟登录成功后跳回列表页
        setTimeout(function() {
            showMsg('✓ 登录成功，正在跳转…', 'success');
            btn.textContent = '✓ 登录成功';
            btn.style.background = 'linear-gradient(135deg,#1a8a4a,#0d6640)';
            btn.style.opacity = '1';
            setTimeout(function() {
                window.location.href = 'whalium_1_index.html';
            }, 1000);
        }, 900);
    }

    function handleWechat() {
        showMsg('微信登录功能开发中，敬请期待', 'info');
    }

    // 回车提交
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') handleLogin();
    });
    </script>

</body>
</html>
